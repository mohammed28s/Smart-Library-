spring.application.name=smartlibrary-backend
server.port=8080

spring.datasource.url=jdbc:sqlite:./data/smartlibrary.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sqlite-init.sql

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:smartlibrary-jwt-secret-key-please-change-this-in-production-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.sms.mode=${SMS_MODE:mock}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}

app.ai.deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
app.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
app.ai.deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
