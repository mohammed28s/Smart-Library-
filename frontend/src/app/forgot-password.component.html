<section class="single-card">
  <article class="card">
    <p class="eyebrow">Account Recovery</p>
    <h2>Forgot Password</h2>
    <div class="mode-switch">
      <button type="button" class="secondary" (click)="mode = 'email'" [class.active]="mode === 'email'">Email</button>
      <button type="button" class="secondary" (click)="mode = 'sms'" [class.active]="mode === 'sms'">SMS</button>
    </div>
    <p class="status error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="status success" *ngIf="message">{{ message }}</p>

    <label *ngIf="mode === 'email'">
      Email
      <input type="email" [(ngModel)]="email" />
    </label>
    <label *ngIf="mode === 'sms'">
      Phone
      <input type="tel" [(ngModel)]="phone" placeholder="+9689xxxxxxx" />
    </label>
    <button type="button" (click)="requestReset()" [disabled]="loading || (mode === 'email' ? !email.trim() : !phone.trim())">
      {{ loading ? 'Generating...' : 'Generate Reset Token' }}
    </button>

    <div class="divider"></div>

    <label *ngIf="mode === 'email'">
      Reset Token
      <input type="text" [(ngModel)]="resetToken" />
    </label>
    <label *ngIf="mode === 'sms'">
      SMS Code
      <input type="text" [(ngModel)]="resetCode" />
    </label>
    <label>
      New Password
      <input type="password" [(ngModel)]="newPassword" />
    </label>
    <button
      type="button"
      (click)="resetPassword()"
      [disabled]="resetting || (mode === 'email' ? !resetToken.trim() : !resetCode.trim() || !phone.trim()) || !newPassword">
      {{ resetting ? 'Resetting...' : 'Reset Password' }}
    </button>

    <p class="hint"><a routerLink="/login">Back to login</a></p>
  </article>
</section>
