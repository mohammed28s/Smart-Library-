<section class="grid">
  <article class="panel">
    <div class="head">
      <h2>{{ editingId ? 'Edit Item' : 'Add Order Item' }}</h2>
      <button class="secondary" type="button" *ngIf="editingId" (click)="reset()">Cancel</button>
    </div>
    <p class="status error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="status success" *ngIf="successMessage">{{ successMessage }}</p>

    <form class="form-grid" (ngSubmit)="submit()">
      <label>Order ID <input type="number" min="1" [(ngModel)]="form.orderId" name="orderId" required /></label>
      <label>Book ID <input type="number" min="1" [(ngModel)]="form.bookId" name="bookId" required /></label>
      <label>Quantity <input type="number" min="1" [(ngModel)]="form.quantity" name="quantity" required /></label>
      <label>Price <input type="number" min="0" step="0.01" [(ngModel)]="form.price" name="price" required /></label>
      <button type="submit" [disabled]="saving">{{ saving ? 'Saving...' : editingId ? 'Update Item' : 'Create Item' }}</button>
    </form>
  </article>

  <article class="panel">
    <div class="head">
      <h2>Order Items</h2>
      <div class="tools">
        <input type="text" [(ngModel)]="search" (ngModelChange)="onSearchChange()" placeholder="Search items..." />
        <button type="button" (click)="load()" [disabled]="loading">{{ loading ? 'Refreshing...' : 'Refresh' }}</button>
      </div>
    </div>
    <div class="skeleton-table" *ngIf="loading"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Order</th>
            <th>Book</th>
            <th>Qty</th>
            <th>Price</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of pagedItems">
            <td>#{{ item.id }}</td>
            <td>{{ item.orderId }}</td>
            <td>{{ item.bookId }}</td>
            <td>{{ item.quantity }}</td>
            <td>${{ item.price | number:'1.2-2' }}</td>
            <td class="actions">
              <button class="secondary" type="button" (click)="edit(item)">Edit</button>
              <button class="danger" type="button" (click)="remove(item)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="!filteredItems.length && !loading">
            <td colspan="6" class="empty">No order items yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="pager" *ngIf="!loading && filteredItems.length > pageSize">
      <button class="secondary" type="button" (click)="prevPage()" [disabled]="page <= 1">Previous</button>
      <span>Page {{ page }} of {{ totalPages }}</span>
      <button class="secondary" type="button" (click)="nextPage()" [disabled]="page >= totalPages">Next</button>
    </div>
  </article>
</section>
