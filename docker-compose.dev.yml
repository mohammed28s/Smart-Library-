services:
  backend:
    build:
      context: ./backend
    container_name: smartlibrary-backend-dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-smartlibrary-jwt-secret-key-please-change-this-in-production-2026}
      - SMS_MODE=${SMS_MODE:-mock}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}

  frontend:
    image: node:20-alpine
    container_name: smartlibrary-frontend-dev
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
